name: Build Mac App
on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run pack -- --mac --publish never
      - name: Upload Mac Build
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/**/*.dmg